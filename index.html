<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fantasy Football League</title>
  <style>
    .draft-formation-status,
    .linear-player-list-view > .draft-formation-status {
      display: none !important;
      visibility: hidden !important;
      height: 0 !important;
      min-height: 0 !important;
      max-height: 0 !important;
      margin: 0 !important;
      padding: 0 !important;
      border: 0 !important;
      overflow: hidden !important;
      opacity: 0 !important;
      pointer-events: none !important;
    }
  </style>
  <link rel="stylesheet" href="style.css?v=default-fast-green-draft-1" />
  <link rel="stylesheet" href="player-cards.css?v=default-fast-green-draft-1" />
  <link rel="stylesheet" href="my-team-cards.css?v=centered-compact-cards-1" />
  <link rel="stylesheet" href="card-lines-override.css?v=readable-name-cards-1" />
  <link rel="stylesheet" href="my-team-compact-cards-override.css?v=fixed-compact-layout-2" />
  <link rel="stylesheet" href="draft-player-list-cards-override.css?v=separated-traits-2" />
  <link rel="stylesheet" href="remove-tactics-squad-cards.css?v=remove-squad-cards-1" />
  <link rel="stylesheet" href="mobile-layout-override.css?v=mobile-side-by-side-1" />
  <link rel="stylesheet" href="formations-layout-override.css?v=detailed-formations-2" />
  <link rel="stylesheet" href="my-team-formation-selector.css?v=detailed-formations-2" />
  <link rel="stylesheet" href="trait-chain-ui.css?v=chain-link-ui-1" />
  <link rel="stylesheet" href="trait-chain-scroll-override.css?v=chain-perf-ui-1" />
  <link rel="stylesheet" href="trait-chain-selected-override.css?v=selected-chain-ui-1" />
  <link rel="stylesheet" href="trait-chain-line-visibility.css?v=visible-chain-lines-1" />
  <link rel="stylesheet" href="trait-chain-explanation-override.css?v=chain-roadmap-2" />
  <link rel="stylesheet" href="bookmaker-theme.css?v=vintage-bookmaker-1" />
  <link rel="stylesheet" href="momentum-casino-colors.css?v=casino-momentum-2" />
  <link rel="stylesheet" href="page1-clean.css?v=page1-clean-1" />
  <link rel="stylesheet" href="snake-draft-bookmaker.css?v=draft-screen-2" />
  <link rel="stylesheet" href="draft-performance.css?v=draft-perf-5" />
  <link rel="stylesheet" href="solid-box-surfaces.css?v=solid-box-surfaces-2" />
  <link rel="stylesheet" href="live-snake-draft-compact.css?v=compact-header-1" />
</head>
<body>
  <main id="app"></main>
  <script>
    (() => {
      const important = (node, prop, value) => {
        if (node) node.style.setProperty(prop, value, 'important');
      };
      const importantAll = (selector, styles) => {
        document.querySelectorAll(selector).forEach(node => {
          Object.entries(styles).forEach(([prop, value]) => important(node, prop, value));
        });
      };

      const removeDraftFormationStatus = () => {
        document.querySelectorAll('.draft-formation-status').forEach(node => node.remove());
        document.querySelectorAll('.linear-player-list-view > div').forEach(node => {
          const text = node.textContent || '';
          if (text.includes('Formation target:') || text.includes('Missing XI slots:')) node.remove();
        });
      };

      const compactDraftLayout = () => {
        const draftPage = document.querySelector('.linear-draft-page');
        if (!draftPage) return;
        draftPage.classList.add('compact-draft-forced');

        const isDesktop = window.matchMedia('(min-width: 900px)').matches;

        const desktop = {
          pageWidth: 'min(1220px, calc(100% - 24px))',
          cardGap: '8px',
          cardPadding: '12px 16px 16px',
          topbarHeight: '66px',
          eyebrowFont: '11px',
          titleFont: '43px',
          onClockFont: '13px',
          speedMin: '126px',
          speedMax: '136px',
          speedPadding: '7px 9px',
          speedLabelFont: '12px',
          selectHeight: '28px',
          selectFont: '12px',
          counterGrid: 'minmax(0, 1.15fr) minmax(330px, .85fr)',
          counterHeight: '38px',
          counterGap: '8px',
          pillHeight: '38px',
          pillPadding: '4px 6px 4px 10px',
          pillLabelFont: '10px',
          pillNumberSize: '30px',
          pillNumberFont: '17px',
          roundPickHeight: '36px',
          roundPickFont: '13px',
          orderHeight: '36px',
          orderFont: '12px',
          orderPadding: '5px 11px',
          tabsHeight: '44px',
          tabButtonHeight: '34px',
          tabButtonFont: '13px',
          viewPadding: '12px',
          viewGap: '8px'
        };

        const mobile = {
          pageWidth: 'min(1100px, calc(100% - 18px))',
          cardGap: '4px',
          cardPadding: '8px 14px 14px',
          topbarHeight: '44px',
          eyebrowFont: '8px',
          titleFont: '31px',
          onClockFont: '10px',
          speedMin: '96px',
          speedMax: '104px',
          speedPadding: '4px 6px',
          speedLabelFont: '9px',
          selectHeight: '20px',
          selectFont: '10px',
          counterGrid: 'minmax(0, 1.25fr) minmax(250px, .85fr)',
          counterHeight: '26px',
          counterGap: '4px',
          pillHeight: '25px',
          pillPadding: '1px 3px 1px 7px',
          pillLabelFont: '7px',
          pillNumberSize: '20px',
          pillNumberFont: '11px',
          roundPickHeight: '25px',
          roundPickFont: '10px',
          orderHeight: '27px',
          orderFont: '9px',
          orderPadding: '3px 7px',
          tabsHeight: '31px',
          tabButtonHeight: '23px',
          tabButtonFont: '10px',
          viewPadding: '10px',
          viewGap: '7px'
        };

        const v = isDesktop ? desktop : mobile;

        important(draftPage, 'width', v.pageWidth);
        important(draftPage, 'padding-top', isDesktop ? '6px' : '4px');

        importantAll('.linear-draft-card', {
          'gap': v.cardGap,
          'padding': v.cardPadding,
          'border-radius': '16px'
        });

        importantAll('.linear-draft-topbar', {
          'min-height': v.topbarHeight,
          'height': v.topbarHeight,
          'max-height': v.topbarHeight,
          'align-items': 'center',
          'gap': isDesktop ? '12px' : '8px',
          'padding': '0',
          'margin': '0'
        });
        importantAll('.linear-draft-topbar > div:first-child', {
          'display': 'grid',
          'gap': isDesktop ? '2px' : '0',
          'align-content': 'center'
        });
        importantAll('.linear-draft-topbar .eyebrow', {
          'margin': '0',
          'font-size': v.eyebrowFont,
          'line-height': '1',
          'letter-spacing': '.13em'
        });
        importantAll('.linear-draft-topbar h1', {
          'margin': '0',
          'font-size': v.titleFont,
          'line-height': isDesktop ? '.92' : '.86',
          'letter-spacing': '0'
        });
        importantAll('.linear-on-clock', {
          'margin': '0',
          'font-size': v.onClockFont,
          'line-height': '1'
        });

        importantAll('.linear-speed-box', {
          'min-width': v.speedMin,
          'max-width': v.speedMax,
          'gap': isDesktop ? '3px' : '1px',
          'padding': v.speedPadding,
          'border-radius': isDesktop ? '11px' : '9px',
          'outline-width': '1px',
          'outline-offset': '2px'
        });
        importantAll('.linear-speed-box span', { 'font-size': v.speedLabelFont, 'line-height': '1' });
        importantAll('.linear-speed-box select', {
          'min-height': v.selectHeight,
          'height': v.selectHeight,
          'padding': isDesktop ? '3px 8px' : '1px 5px',
          'border-radius': isDesktop ? '8px' : '6px',
          'font-size': v.selectFont,
          'line-height': '1'
        });

        importantAll('.linear-counter-block', {
          'display': 'grid',
          'grid-template-columns': v.counterGrid,
          'gap': isDesktop ? '8px' : '5px',
          'align-items': 'center',
          'margin': '0',
          'min-height': v.counterHeight
        });
        importantAll('.linear-round-counter', {
          'display': 'grid',
          'grid-template-columns': 'repeat(4, minmax(0, 1fr))',
          'gap': v.counterGap,
          'min-height': v.counterHeight,
          'margin': '0'
        });
        importantAll('.linear-counter-pill', {
          'min-height': v.pillHeight,
          'height': v.pillHeight,
          'padding': v.pillPadding,
          'gap': isDesktop ? '7px' : '4px',
          'border-radius': '999px',
          'outline-width': '0',
          'margin': '0'
        });
        importantAll('.linear-counter-pill span', {
          'font-size': v.pillLabelFont,
          'line-height': '1',
          'letter-spacing': '.04em'
        });
        importantAll('.linear-counter-pill strong', {
          'min-width': v.pillNumberSize,
          'min-height': v.pillNumberSize,
          'width': v.pillNumberSize,
          'height': v.pillNumberSize,
          'font-size': v.pillNumberFont,
          'line-height': '1'
        });
        importantAll('.linear-round-picks', {
          'min-height': v.roundPickHeight,
          'height': v.roundPickHeight,
          'padding': isDesktop ? '4px 12px' : '2px 8px',
          'border-radius': '999px',
          'font-size': v.roundPickFont,
          'line-height': '1',
          'display': 'flex',
          'align-items': 'center',
          'justify-content': 'center',
          'margin': '0',
          'overflow': 'hidden',
          'text-overflow': 'ellipsis'
        });

        importantAll('.linear-order-ticker', {
          'min-height': v.orderHeight,
          'height': v.orderHeight,
          'padding': isDesktop ? '4px 9px' : '2px 7px',
          'gap': isDesktop ? '7px' : '4px',
          'align-items': 'center',
          'justify-content': 'center',
          'border-radius': isDesktop ? '12px' : '11px',
          'margin': '0',
          'overflow': 'hidden'
        });
        importantAll('.linear-order-ticker span', {
          'padding': v.orderPadding,
          'font-size': v.orderFont,
          'line-height': '1',
          'border-radius': '999px'
        });

        importantAll('.linear-draft-tabs', {
          'min-height': v.tabsHeight,
          'height': v.tabsHeight,
          'gap': isDesktop ? '8px' : '5px',
          'padding': isDesktop ? '5px 8px' : '3px 6px',
          'border-radius': isDesktop ? '13px' : '11px',
          'outline-width': '1px',
          'outline-offset': '2px',
          'margin': '0'
        });
        importantAll('.linear-draft-tabs button', {
          'min-height': v.tabButtonHeight,
          'height': v.tabButtonHeight,
          'padding': isDesktop ? '6px 12px' : '3px 8px',
          'border-radius': isDesktop ? '9px' : '7px',
          'font-size': v.tabButtonFont,
          'line-height': '1'
        });

        importantAll('.linear-draft-view', {
          'margin-top': '4px',
          'padding': v.viewPadding,
          'gap': v.viewGap,
          'border-radius': '15px'
        });
        importantAll('.linear-player-card, .draft-list-player-card, .player-card, .my-team-card, .linear-info-player-card', {
          'outline-width': '1px',
          'outline-offset': '2px',
          'border-width': '1px',
          'border-radius': '11px'
        });
      };

      const runDraftFixes = () => {
        removeDraftFormationStatus();
        compactDraftLayout();
      };

      window.__removeDraftFormationStatus = removeDraftFormationStatus;
      window.__compactDraftLayout = compactDraftLayout;
      document.addEventListener('DOMContentLoaded', runDraftFixes);
      window.addEventListener('resize', runDraftFixes);
      new MutationObserver(runDraftFixes).observe(document.documentElement, { childList: true, subtree: true });
    })();
  </script>
  <script type="module" src="js/linear/linearApp.js?v=start-bookmaker-6"></script>
</body>
</html>
