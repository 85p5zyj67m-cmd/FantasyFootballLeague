  <style>
    .draft-formation-status,
    .linear-player-list-view > .draft-formation-status {
      display: none !important;
      visibility: hidden !important;
      height: 0 !important;
      min-height: 0 !important;
      max-height: 0 !important;
      margin: 0 !important;
      padding: 0 !important;
      border: 0 !important;
      overflow: hidden !important;
      opacity: 0 !important;
      pointer-events: none !important;
    }
  </style>
</head>
<body>
  <main id="app"></main>
  <script>
    (() => {
      const removeDraftFormationStatus = () => {
        document.querySelectorAll('.draft-formation-status').forEach(node => node.remove());
        document.querySelectorAll('.linear-player-list-view > div').forEach(node => {
          const text = node.textContent || '';
          if (text.includes('Formation target:') || text.includes('Missing XI slots:')) node.remove();
        });
      };
      document.addEventListener('DOMContentLoaded', removeDraftFormationStatus);
      new MutationObserver(removeDraftFormationStatus).observe(document.documentElement, { childList: true, subtree: true });
    })();
  </script>
  <script type="module" src="js/linear/linearApp.js?v=start-bookmaker-final-26"></script>
</body>
