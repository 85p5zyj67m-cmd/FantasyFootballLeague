<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chain Path Overview</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #06110c;
      --panel: #101827;
      --panel-2: #07150e;
      --green: #75ff9e;
      --gold: #f7c95f;
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.72);
      --border: rgba(117, 255, 158, 0.22);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(117, 255, 158, 0.16), transparent 34rem),
        linear-gradient(180deg, #07150e, #020604);
      color: var(--text);
    }

    main {
      width: min(100% - 28px, 1380px);
      margin: 0 auto;
      padding: 26px 0 60px;
    }

    .hero,
    .controls,
    .summary,
    .formation-section {
      border: 1px solid var(--border);
      border-radius: 18px;
      background: rgba(16, 24, 39, 0.82);
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.32);
    }

    .hero {
      padding: 22px;
      margin-bottom: 16px;
    }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--gold);
      font-size: 0.72rem;
      font-weight: 950;
      letter-spacing: 0.32em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 4.4rem);
      line-height: 0.95;
      letter-spacing: -0.055em;
    }

    .hero p {
      max-width: 920px;
      margin: 12px 0 0;
      color: var(--muted);
      line-height: 1.45;
    }

    .controls {
      position: sticky;
      top: 8px;
      z-index: 10;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      padding: 12px;
      margin-bottom: 16px;
      backdrop-filter: blur(16px);
    }

    .control,
    .toggle {
      display: grid;
      gap: 6px;
      color: var(--green);
      font-size: 0.72rem;
      font-weight: 950;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .toggle {
      align-content: end;
      min-height: 56px;
      color: var(--text);
      text-transform: none;
      letter-spacing: 0;
      font-size: 0.86rem;
    }

    select {
      width: 100%;
      min-height: 40px;
      border: 1px solid rgba(117, 255, 158, 0.32);
      border-radius: 999px;
      padding: 8px 11px;
      background: #07110d;
      color: var(--text);
      font-weight: 850;
    }

    input { accent-color: var(--green); }

    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      padding: 12px;
      margin-bottom: 16px;
    }

    .summary div {
      padding: 12px;
      border-radius: 14px;
      background: rgba(117, 255, 158, 0.07);
    }

    .summary strong {
      display: block;
      color: var(--green);
      font-size: 1.7rem;
      line-height: 1;
    }

    .summary span {
      color: var(--muted);
      font-size: 0.76rem;
      font-weight: 800;
    }

    .formation-section {
      margin-bottom: 16px;
      padding: 14px;
    }

    .formation-section header {
      display: flex;
      gap: 12px;
      justify-content: space-between;
      align-items: end;
      margin-bottom: 10px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .formation-section h2 {
      margin: 0;
      color: var(--green);
      font-size: 1.4rem;
    }

    .formation-section header p {
      margin: 0;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 800;
      text-align: right;
    }

    .chain-card {
      margin: 8px 0;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 14px;
      overflow: hidden;
      background: rgba(0, 0, 0, 0.18);
    }

    .chain-card.possible {
      border-color: rgba(117, 255, 158, 0.22);
    }

    .chain-title {
      width: 100%;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      padding: 12px;
      border: 0;
      background: transparent;
      color: var(--text);
      cursor: pointer;
      text-align: left;
      font: inherit;
      font-weight: 900;
    }

    .chain-title strong {
      color: var(--gold);
      white-space: nowrap;
    }

    .chain-body {
      display: grid;
      gap: 10px;
      padding: 0 12px 12px;
    }

    .meta,
    .empty {
      margin: 0;
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.35;
    }

    .small { font-size: 0.76rem; }

    .path-card {
      display: grid;
      gap: 8px;
      padding: 10px;
      border-radius: 12px;
      border: 1px solid rgba(117, 255, 158, 0.16);
      background: rgba(7, 21, 14, 0.78);
    }

    .path-card h3 {
      margin: 0;
      color: var(--gold);
      font-size: 0.84rem;
    }

    .path-steps {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 8px;
      align-items: stretch;
    }

    .arrow {
      display: none;
    }

    .path-step {
      display: grid;
      gap: 5px;
      padding: 9px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.055);
      min-width: 0;
    }

    .path-step strong {
      color: var(--green);
      font-size: 0.84rem;
    }

    .path-step span {
      color: var(--gold);
      font-size: 0.72rem;
      font-weight: 900;
    }

    .path-step p {
      margin: 0;
      color: rgba(255, 255, 255, 0.83);
      font-size: 0.74rem;
      line-height: 1.32;
    }

    em {
      color: var(--gold);
      font-style: normal;
      font-weight: 900;
    }

    @media (max-width: 760px) {
      main {
        width: min(100% - 12px, 1380px);
        padding-top: 10px;
      }

      .hero,
      .formation-section {
        padding: 12px;
        border-radius: 14px;
      }

      .controls {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 7px;
        padding: 8px;
      }

      .summary {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        padding: 8px;
      }

      .formation-section header {
        display: grid;
        gap: 5px;
      }

      .formation-section header p {
        text-align: left;
      }

      .path-steps {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <p class="eyebrow">Fantasy Football League</p>
      <h1>Chain Path Overview</h1>
      <p>
        Diese Übersicht wird live aus deiner aktuellen Spielerliste, den Formationen und den Chain-Definitionen erzeugt.
        Jeder Pfad zeigt: Formation, Chain-Level, verbundene Formation-Slots und passende Spieler pro Trait.
      </p>
    </section>

    <section id="controls" class="controls" aria-label="Filters"></section>
    <section id="summary" class="summary" aria-label="Summary"></section>
    <section id="report" aria-label="Chain path report"></section>
  </main>

  <script type="module" src="js/chainPathOverview.js?v=chain-path-overview-1"></script>
</body>
</html>
